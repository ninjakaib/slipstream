repos:
  - repo: local
    hooks:
      - id: sync-api
        name: Sync OpenAPI spec and TypeScript SDK
        entry: bash -c 'make sync-api && git add openapi.json slipstream/src/lib/api/'
        language: system
        files: ^backend/src/slipstream/(routers/|models\.py|main\.py|dependencies\.py)
        pass_filenames: false

      - id: generate-erd
        name: Generate ERD
        entry: bash -c 'cd backend && uv run paracelsus inject ../docs/erd.md && git add ../docs/erd.md'
        language: system
        files: backend/src/slipstream/models.py
        pass_filenames: false
