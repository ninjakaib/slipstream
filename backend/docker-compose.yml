# SlipStream Backend Docker Compose Configuration
#
# Usage:
#   Development:  docker compose up --watch
#   Build only:   docker compose build
#   Production:   Use bake with CI targets (see docker-bake.hcl)
# =============================================================================

services:
  # ==========================================================================
  # Postgres - Primary database with PostGIS
  # ==========================================================================
  postgres:
    image: postgis/postgis:17-3.5-alpine
    container_name: slipstream_postgres
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-slipstream}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-slipstream}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - slipstream_network


  # ==========================================================================
  # API - FastAPI application
  # ==========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-dev
      args:
        # Enable editable install for hot reload (0 = editable)
        UV_NO_EDITABLE: "0"
    image: slipstream-api:dev
    pull_policy: build
    container_name: slipstream_api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-slipstream}
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - slipstream_network
    develop:
      watch:
        # Sync source code and restart on changes (editable install)
        - action: sync+restart
          path: ./src
          target: /project/src
          ignore:
            - __pycache__/
            - "*.pyc"
            - .venv/
        # Sync alembic config and migrations
        - action: sync
          path: ./alembic.ini
          target: /project/alembic.ini
        - action: sync+restart
          path: ./alembic
          target: /project/alembic
          ignore:
            - __pycache__/
            - "*.pyc"
        # Rebuild on dependency changes
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./uv.lock

networks:
  slipstream_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local